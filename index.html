<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let path;
        let enemy;

        function preload() {
            // Placeholder graphics
            this.load.image('enemy', 'https://labs.phaser.io/assets/sprites/asuna_by_vali233.png');
        }

        function create() {
            // 1. Create a path for enemies to follow
            path = new Phaser.Curves.Path(0, 100);
            path.lineTo(400, 100);
            path.lineTo(400, 400);
            path.lineTo(800, 400);

            // Visualize path
            let graphics = this.add.graphics();
            graphics.lineStyle(3, 0xffffff, 1);
            path.draw(graphics);

            // 2. Add the Enemy
            enemy = this.add.follower(path, 0, 100, 'enemy').setScale(0.2);
            enemy.startFollow({
                duration: 10000,
                loop: -1,
                rotateToPath: true
            });
        }

        function update() {
            // Logic for checking tower range or game over goes here
        }
    </script>
</body>
</html>
